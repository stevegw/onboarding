<!DOCTYPE html>
<html lang="en" data-theme="dark" data-scheme="ptc">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTC Training</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,600&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Mobile menu button -->
    <button class="mobile-menu-btn" id="mobile-menu-btn" data-i18n-aria="app.openMenu" aria-label="Open menu">&#9776;</button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-text">
          <h2 data-i18n="catalog.platformTitle">PTC Training</h2>
          <p data-i18n="catalog.platformSubtitle">Course Catalog</p>
        </div>
        <span id="locale-selector"></span>
        <button class="scheme-toggle" id="scheme-toggle-btn" title="Color scheme">PTC</button>
        <button class="narr-toggle-btn" id="narr-toggle-btn" title="Toggle narration">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button class="theme-toggle" id="theme-toggle-btn" data-i18n-title="app.toggleTheme" title="Toggle theme">&#9790;</button>
      </div>

      <!-- Narration control bar (below sidebar header) -->
      <div class="narr-bar" id="narr-bar">
        <button class="narr-btn" id="narr-play-btn" title="Play">&#9654;</button>
        <button class="narr-btn" id="narr-stop-btn" title="Stop">&#9632;</button>
        <div class="narr-divider"></div>
        <select class="narr-select" id="narr-voice-select" title="Voice"></select>
        <select class="narr-select" id="narr-rate-select" title="Speed"></select>
      </div>

      <div class="sb-back" id="nav-back" style="display:none">
        <!-- Back link rendered by sidebar.js -->
      </div>

      <div class="sb-search" id="sb-search" style="display:none">
        <!-- Search box rendered by search.js -->
      </div>

      <nav class="sb-nav" id="nav">
        <!-- Rendered by sidebar.js -->
      </nav>

      <div class="sb-progress">
        <p data-i18n="app.courseProgress">Course Progress</p>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>

      <div class="sb-actions">
        <button class="sb-reset" id="reset-btn" data-i18n="app.resetProgress">Reset Progress</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main" id="main">
      <!-- Views rendered by JS -->
    </main>

    <!-- Notepad FAB -->
    <button class="notepad-fab" id="notepad-fab" data-i18n-title="notepad.openNotepad" title="Open notepad">&#9998;</button>

    <!-- Notepad panel -->
    <div class="notepad-panel" id="notepad-panel">
      <div class="notepad-header">
        <span data-i18n="notepad.title">Notes</span>
        <button class="notepad-close" id="notepad-close">&#10005;</button>
      </div>
      <textarea class="notepad-textarea" id="notepad-textarea" data-i18n-placeholder="notepad.placeholder" placeholder="Take notes as you learn..."></textarea>
      <div class="notepad-footer">
        <span class="notepad-count" id="notepad-count">0 chars</span>
      </div>
    </div>

  </div>

  <!-- JS modules (order matters) -->
  <script src="js/ui.js"></script>
  <script src="js/state.js"></script>
  <script src="js/catalog-bundle.js"></script>
  <script src="js/content.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/search.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/topic.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/glossary.js"></script>
  <script src="js/notepad.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/author.js"></script>
  <script src="js/export.js"></script>
  <script src="js/import-modal.js"></script>
  <script src="js/catalog-manager.js"></script>
  <script src="js/router.js"></script>

  <script>OB.i18n.init().then(function() { OB.router.init(); });</script>
</body>
</html>
